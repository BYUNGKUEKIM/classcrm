<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 - 포토스튜디오 CRM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #333;
    }
    
    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      background: #fff3cd;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      background: #ff6b6b;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    .button {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
      font-size: 16px;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .info-box {
      margin-top: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      text-align: left;
    }
    
    .info-box h3 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
    }
    
    .info-box ul {
      list-style: none;
      padding: 0;
    }
    
    .info-box li {
      padding: 8px 0;
      color: #666;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .info-box li:before {
      content: '✓';
      color: #4caf50;
      font-weight: bold;
      font-size: 18px;
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .icon {
        width: 100px;
        height: 100px;
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      📡
    </div>
    
    <h1>인터넷 연결이 필요합니다</h1>
    
    <div class="status">
      <div class="status-dot"></div>
      <span>오프라인 모드</span>
    </div>
    
    <p>
      현재 인터넷에 연결되어 있지 않습니다.<br>
      네트워크 연결을 확인한 후 다시 시도해 주세요.
    </p>
    
    <button class="button" onclick="window.location.reload()">
      다시 시도
    </button>
    
    <div class="info-box">
      <h3>💡 오프라인 모드에서 가능한 작업</h3>
      <ul>
        <li>이전에 로드한 데이터 보기</li>
        <li>예약 정보 작성 (연결 시 자동 저장)</li>
        <li>고객 정보 조회</li>
        <li>임시 메모 작성</li>
      </ul>
    </div>
  </div>
  
  <script>
    // 온라인 상태가 되면 자동으로 새로고침
    window.addEventListener('online', () => {
      console.log('Back online! Reloading...');
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });
    
    // 연결 상태 확인
    function checkConnection() {
      if (navigator.onLine) {
        window.location.reload();
      }
    }
    
    // 10초마다 연결 상태 확인
    setInterval(checkConnection, 10000);
  </script>
</body>
</html>
